  <text x="190" y="170" text-anchor="middle" fill="#075985" font-size="11" font-weight="bold" font-family="Arial">📊 CEO</text>
  <text x="190" y="187" text-anchor="middle" fill="#075985" font-size="9" font-family="Arial">Briefing</text>

  <line x1="132" y1="173" x2="115" y2="173" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

