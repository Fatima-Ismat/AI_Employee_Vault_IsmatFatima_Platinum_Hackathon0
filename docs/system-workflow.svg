  <text x="325" y="187" text-anchor="middle" fill="#0f766e" font-size="9" font-family="Arial">Logs + Audit</text>

  <line x1="266" y1="173" x2="249" y2="173" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

