  <text x="66" y="170" text-anchor="middle" fill="#15803d" font-size="11" font-weight="bold" font-family="Arial">🎉 Done</text>
  <text x="66" y="187" text-anchor="middle" fill="#15803d" font-size="9" font-family="Arial">Complete</text>

  <!-- Dashed lines up from Done/Evidence/CEO to Dashboard bar -->
  <line x1="66" y1="198" x2="66" y2="228" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="190" y1="198" x2="190" y2="228" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="325" y1="198" x2="325" y2="228" stroke="#14b8a6" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ─── Cloud Dashboard Bar ─── -->
  <rect x="18" y="229" width="850" height="56" fill="#1e293b" stroke="#475569" stroke-width="1.5" rx="8"/>
  <text x="443" y="252" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="bold" font-family="Arial">☁️ Cloud Deployment Layer</text>
  <text x="230" y="274" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial">▲ Vercel Frontend</text>
  <text x="443" y="274" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial">🤗 Hugging Face Spaces Backend</text>
  <text x="680" y="274" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="Arial">🐙 GitHub CI/CD</text>

  <!-- Separator lines in cloud bar -->
  <line x1="340" y1="235" x2="340" y2="279" stroke="#334155" stroke-width="1"/>
  <line x1="565" y1="235" x2="565" y2="279" stroke="#334155" stroke-width="1"/>

  <!-- Row direction labels -->
  <text x="340" y="62" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Arial">→ pipeline flows right →</text>
  <text x="430" y="145" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="Arial">← pipeline continues left ←</text>

  <!-- Footer -->
  <text x="450" y="340" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="Arial">AI_Employee_Vault_IsmatFatima_Platinum_Hackathon0 · claude-sonnet-4-6</text>
</svg>
