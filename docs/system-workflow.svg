<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16a34a"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="360" fill="#f8fafc" rx="12"/>
  <rect x="1" y="1" width="898" height="358" fill="none" stroke="#e2e8f0" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#0f172a" font-size="15" font-weight="bold" font-family="Arial, sans-serif">AI Employee Vault — End-to-End Pipeline Workflow</text>
  <text x="450" y="48" text-anchor="middle" fill="#64748b" font-size="11" font-family="Arial, sans-serif">IsmatFatima · Platinum Tier · Personal AI Employee Hackathon 0</text>

  <!-- ─── ROW 1 (top pipeline) ─── -->
  <!-- 1: External Event -->
  <rect x="18" y="68" width="118" height="52" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="77" y="89" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold" font-family="Arial">📡 External</text>
  <text x="77" y="105" text-anchor="middle" fill="#1e40af" font-size="10" font-family="Arial">Event Sources</text>

  <line x1="137" y1="94" x2="154" y2="94" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 2: Inbox -->
  <rect x="155" y="68" width="102" height="52" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="206" y="89" text-anchor="middle" fill="#3730a3" font-size="11" font-weight="bold" font-family="Arial">📥 Inbox</text>
  <text x="206" y="105" text-anchor="middle" fill="#3730a3" font-size="9" font-family="Arial">Vault Stage 1</text>

  <line x1="258" y1="94" x2="275" y2="94" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3: Needs Action -->
  <rect x="276" y="68" width="118" height="52" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" rx="8"/>
  <text x="335" y="89" text-anchor="middle" fill="#5b21b6" font-size="11" font-weight="bold" font-family="Arial">⚡ Needs</text>
  <text x="335" y="105" text-anchor="middle" fill="#5b21b6" font-size="9" font-family="Arial">Action</text>

  <line x1="395" y1="94" x2="412" y2="94" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4: Plans / Claude -->
  <rect x="413" y="68" width="118" height="52" fill="#faf5ff" stroke="#a855f7" stroke-width="2" rx="8"/>
  <text x="472" y="89" text-anchor="middle" fill="#7e22ce" font-size="11" font-weight="bold" font-family="Arial">🧠 Plans</text>
  <text x="472" y="105" text-anchor="middle" fill="#7e22ce" font-size="9" font-family="Arial">Claude Reasoning</text>

  <line x1="532" y1="94" x2="549" y2="94" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5: Pending Approval -->
  <rect x="550" y="68" width="140" height="52" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="620" y="89" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold" font-family="Arial">⏳ Pending</text>
  <text x="620" y="105" text-anchor="middle" fill="#92400e" font-size="9" font-family="Arial">Approval (HITL)</text>

  <!-- Branch: approved (down-left) -->
  <line x1="600" y1="121" x2="600" y2="148" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="548" y="140" fill="#15803d" font-size="9" font-family="Arial" font-weight="bold">✓ approved</text>

  <!-- Branch: rejected (down-right) -->
  <line x1="660" y1="121" x2="760" y2="148" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="690" y="140" fill="#dc2626" font-size="9" font-family="Arial" font-weight="bold">✗ rejected</text>

  <!-- ─── ROW 2 (continuation, left-to-right) ─── -->

  <!-- 6a: Approved -->
  <rect x="540" y="149" width="118" height="48" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="8"/>
  <text x="599" y="170" text-anchor="middle" fill="#15803d" font-size="11" font-weight="bold" font-family="Arial">✅ Approved</text>
  <text x="599" y="187" text-anchor="middle" fill="#15803d" font-size="9" font-family="Arial">action queued</text>

  <!-- 6b: Rejected (end branch) -->
  <rect x="750" y="149" width="118" height="48" fill="#fee2e2" stroke="#ef4444" stroke-width="2" rx="8"/>
  <text x="809" y="170" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold" font-family="Arial">❌ Rejected</text>
  <text x="809" y="187" text-anchor="middle" fill="#dc2626" font-size="9" font-family="Arial">logged + closed</text>

  <!-- Arrow from Approved LEFT to MCP -->
  <line x1="539" y1="173" x2="522" y2="173" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7: MCP Execution -->
  <rect x="403" y="149" width="118" height="48" fill="#fff7ed" stroke="#f97316" stroke-width="2" rx="8"/>
  <text x="462" y="170" text-anchor="middle" fill="#c2410c" font-size="11" font-weight="bold" font-family="Arial">🔧 MCP Tools</text>
  <text x="462" y="187" text-anchor="middle" fill="#c2410c" font-size="9" font-family="Arial">Execution</text>

  <line x1="402" y1="173" x2="385" y2="173" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

